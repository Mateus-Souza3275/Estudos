<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position</title>
    <style>
        div.static {
            position:static;
            border: 3px solid blue;
        }
        div.relative {
            position:relative;
            border: 3px solid blue;
        

            
        }
        div.fixed {
            position:fixed;
            border: 3px solid blue;


        }
        div.absolute {
            position: absolute;
            border: 3px solid blue;

        }














    </style>
</head>
<body>
    <h1>Position</h1>
    <p>Posiçâo estática</p>
    <div class="static">
        <p>Exemplo estática</p>

    </div>
    <h2>Posiçâo relativa
        
    </h2>
    <div class="relative">
        <p>Exemplo posiçâo relativa</p>
    </div>
    <h2>Posição Fixa</h2>
    <div class="fixed">
        <p>Exemplo Fixa</p>

    </div>
    <br>
    <br>
    <h2>Posição Absoluta</h2>
    <br>
    <div class="absolute">
        <p>Exemplo de Absoluta</p>


    </div>
</body>
</html>
