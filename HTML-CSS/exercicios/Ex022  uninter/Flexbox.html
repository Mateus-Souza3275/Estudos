<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        .box {
            border: 5px solid black;
            padding: 10px;
            font-size: 20px;
            background-color: rgb(241, 158, 4);
            color: rgba(19, 18, 18, 0.829);
            text-align: center;
        }
        .box1 {
            background-color: green;
            color: yellow;
            font-size: 20px;
            padding: 10px;
            border: 5px solid black;
            text-align: center;
        }
        .box2 {
            background-color: aquamarine;
            color: black;
            font-size: 20px;
            padding: 20px;
            border: 5px solid black;
            text-align: center;

        }
        .box3 {
            background-color: red;
            color: black;
            font-size: 20px;
            border: 5px solid black;
            padding: 20px;
            text-align: center;

        }
        .container {
            display: flex;
            justify-content: space-around;
            justify-content: baseline;
            justify-content: end;
            justify-content: flex-end;
            justify-content: center;
        }











    </style>
</head>
<body>
    <div class="container">
        <div class="box">SPAIN</div>
        <div class="box1">Brazil</div>
        <div class="box2">ARGENTINA</div>
        <div class="box3">ALEMANHA</div>




    </div>
    
</body>
</html>
