<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div</title>
    <style>
        body {
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }
         div > p {
            display: none;
         }
        
         div:hover{ 
             color: aqua;
             display: inline-block;
             border: 1px solid black
             height: 100px;
             widht: 100px;



         }
         div:hover > p {
            display: block;
            color: blueviolet;
            
     
            
         }
       


    </style>
</head>
<body>
    <h1>Pseudo Classes</h1>
    
    <div>
         Passe o mouse aqui
         <p>texto escondido</p>


    </div>

    <div>1</div>
    <div>2</div>
    <div>3</div>

    
</body>
</html>
