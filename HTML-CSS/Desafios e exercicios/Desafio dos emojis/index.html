<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emojis</title>
</head>
<body>
    <h1>Meus Emojis Favoritos</h1>
    <h2>Esportes</h2>
    <ol>
       <ul type="circle">
         <li>⚽</li>
         <li>🏈</li>
         <li>🥎</li> 
       </ul>

       <ul type="square">
        <li>🍱 </li>
        <li>🍔 </li>
        <li>🍕 </li>
       </ul>
    <h2>Animais</h2>
      <ul type="disc">
        <li>🦈</li>
        <li>🦑</li>
        <li>🐌</li>
      </ul>
    </ol>
    <h2>Desafio concluído!!</h2>


</body>
</html>
